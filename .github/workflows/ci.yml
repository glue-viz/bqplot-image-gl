name: CI Tests

on:
  push:
    branches:
    - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build jupyterlab

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "__version__ = \"$VERSION\"" > bqplot_image_gl/_version.py
          cd js && npm version $VERSION --no-git-tag-version

      - name: Install JavaScript dependencies
        run: (cd js && npm ci && npm run build && npm pack)

      - name: Build
        run: |
          python -m build

      - name: Upload builds
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: bqplot-image-gl-dist-${{ github.run_number }}
          path: |
            ./dist
            ./js/*.tgz

  tests:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e97344095b099e1d729fe97429078c9975921d8a  # v2.6.2
    with:
      coverage: codecov

      envs: |
        # Code style
        - linux: codestyle
          coverage: false

        - linux: py310-test
        - linux: py313-test

        - macos: py311-test
        - macos: py312-test

        - windows: py310-test
        - windows: py313-test

        - linux: py310-notebooks
        - macos: py312-notebooks
        - windows: py311-notebooks

  publish-pypi:
    needs: [build, tests]
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: bqplot-image-gl-dist-${{ github.run_number }}

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0

  publish-npm:
    needs: [build, tests]
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: bqplot-image-gl-dist-${{ github.run_number }}

      - name: Install node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Publish the NPM package
        run: |
          if [[ $PRE_RELEASE == "true" ]]; then export TAG="next"; else export TAG="latest"; fi
          cd js
          npm publish --tag ${TAG} --access public --provenance *.tgz
        env:
          PRE_RELEASE: ${{ github.event.release.prerelease }}

  update-version:
    needs: [publish-pypi, publish-npm]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: main
          persist-credentials: true

      - name: Install node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22.x"

      - name: Update version files
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "__version__ = \"$VERSION\"" > bqplot_image_gl/_version.py
          cd js && npm version $VERSION --no-git-tag-version

      - name: Update changelog
        uses: stefanzweifel/changelog-updater-action@a938690fad7edf25368f37e43a1ed1b34303eb36  # v1
        with:
          release-notes: ${{ github.event.release.body }}
          latest-version: ${{ github.event.release.name }}
          path-to-changelog: CHANGES.md

      - name: Commit version and changelog update
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bqplot_image_gl/_version.py js/package.json CHANGES.md
          git diff --staged --quiet || git commit -m "Update version to $VERSION and changelog [skip ci]"
          git push
